<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSUKOYOMI-IA</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; max-width: 640px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
        h2 { margin-bottom: 16px; color: #222; }

        /* Panel Escenario (Pantalla 1) */
        #pantalla-configuracion { background: #eef2f5; padding: 20px; border-radius: 8px; border: 1px solid #d0d7de; margin-bottom: 15px; }
        #pantalla-configuracion label { font-weight: bold; font-size: 15px; color: #333; display: block; margin-bottom: 10px; }
        #input-escenario { height: 100px; font-size: 15px; margin-bottom: 15px; }
        
        /* Contenedor del Chat (Pantalla 2) */
        #pantalla-chat { display: none; }

        #chat-box {
            background: white; border: 1px solid #ddd; border-radius: 10px;
            padding: 16px; height: 380px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px;
        }
        .mensaje { max-width: 78%; padding: 10px 14px; border-radius: 14px; line-height: 1.45; font-size: 15px; }
        .msj-usuario { background: #0b7dda; color: white; align-self: flex-end; border-bottom-right-radius: 3px; }
        .msj-bot     { background: #e8e8e8; color: #111;  align-self: flex-start; border-bottom-left-radius: 3px; }
        .escribiendo { font-style: italic; color: #888; font-size: 13px; align-self: flex-start; }

        textarea { width: 100%; padding: 10px; font-size: 15px; border-radius: 6px; border: 1px solid #ccc; resize: none; }
        #chat-input { height: 80px; }
        
        button {
            width: 100%; padding: 12px; font-size: 16px; cursor: pointer; background: #28a745;
            color: white; border: none; border-radius: 6px; font-weight: bold;
        }
        button:disabled { background: #999; cursor: not-allowed; }
        #btn-comenzar { background: #0b7dda; transition: all 0.3s; }

        .debug-panel { margin-top: 28px; border-top: 2px dashed #ccc; padding-top: 18px; }
        .debug-panel h3 { margin-bottom: 10px; font-size: 15px; color: #444; }
        pre { background: #1e1e1e; color: #00e676; padding: 14px; border-radius: 6px; overflow-x: auto; font-size: 13px; line-height: 1.5; }

        .bio-bar { display: flex; gap: 16px; font-size: 12px; color: #666; margin-top: 6px; margin-bottom: 15px; }
        .bio-item span { font-weight: 600; color: #333; }
    </style>
</head>
<body>

<h2>TSUKOYOMI — IA</h2>

<div id="pantalla-configuracion">
    <label>1. Define el contexto de la simulación:</label>
    <textarea id="input-escenario" placeholder="Ej: Mi compañero no trabajó en el proyecto y le voy a reclamar ahora mismo."></textarea>
    <button id="btn-comenzar">Comenzar Simulación</button>
</div>

<div id="pantalla-chat">
    <div id="chat-box">
        </div>

    <label style="font-weight: bold; font-size: 14px; color: #333; display: block; margin-bottom: 5px;">2. Tu respuesta (Biometría activa):</label>
    <textarea id="chat-input" placeholder="Escribe aquí..."></textarea>

    <div class="bio-bar">
        <div class="bio-item">Borrados: <span id="cnt-borrados">0</span></div>
        <div class="bio-item">Pulsaciones: <span id="cnt-pulsaciones">0</span></div>
        <div class="bio-item">Ratio: <span id="cnt-ratio">0.00</span></div>
        <div class="bio-item">Paste: <span id="cnt-paste">No</span></div>
    </div>

    <button id="btn-enviar">Enviar Mensaje</button>
</div>

<div class="debug-panel">
    <h3>Telemetría (Fases A · B · C)</h3>
    <pre id="output-json">Esperando interacción...</pre>
</div>

<script>
const inputEscenario = document.getElementById('input-escenario');
const btnComenzar    = document.getElementById('btn-comenzar');
const pantallaConfig = document.getElementById('pantalla-configuracion');
const pantallaChat   = document.getElementById('pantalla-chat');
const inputChat      = document.getElementById('chat-input');
const btnEnviar      = document.getElementById('btn-enviar');
const outputJson     = document.getElementById('output-json');
const chatBox        = document.getElementById('chat-box');
const cntBorrados    = document.getElementById('cnt-borrados');
const cntPuls        = document.getElementById('cnt-pulsaciones');
const cntRatio       = document.getElementById('cnt-ratio');
const cntPaste       = document.getElementById('cnt-paste');

const MAX_HISTORIAL = 20;
let historialChat = [];
let tiempoInicio = null, contadorBorrados = 0, pulsacionesTotales = 0, hizoCopyPaste = false;

// --- HELPERS ---
function agregarMensaje(texto, tipo) {
    const div = document.createElement('div');
    div.className = `mensaje msj-${tipo}`;
    div.textContent = texto;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function resetSensores() {
    tiempoInicio = null; contadorBorrados = 0; pulsacionesTotales = 0; hizoCopyPaste = false;
    actualizarBioBar();
}

function actualizarBioBar() {
    const longitud = inputChat.value.length || 1;
    cntBorrados.textContent = contadorBorrados;
    cntPuls.textContent = pulsacionesTotales;
    cntRatio.textContent = (pulsacionesTotales / longitud).toFixed(2);
    cntPaste.textContent = hizoCopyPaste ? 'Sí' : 'No';
}

// --- TRANSICIÓN E INICIALIZACIÓN ---
btnComenzar.addEventListener('click', async () => {
    const esc = inputEscenario.value.trim();
    if (!esc) {
        alert("Por favor describe el escenario.");
        return;
    }
    
    btnComenzar.textContent = "Generando primer contacto...";
    btnComenzar.disabled = true;

    // Metadatos "limpios" para el inicio
    const payloadInicial = {
        tiempo_escritura_segundos: 0.1,
        teclas_borrado: 0,
        pulsaciones_totales: 1,
        ratio_duda: 1.0,
        copy_paste_detectado: false,
        longitud_caracteres: 1,
        edad_usuario: 16
    };

    try {
        const res = await fetch('http://127.0.0.1:8000/simular-friccion', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                escenario: esc,
                texto_usuario: "Inicia la conversación según el escenario planteado.",
                metadatos: payloadInicial,
                historial: []
            })
        });

        if (!res.ok) throw new Error("Error en servidor");

        const datos = await res.json();
        
        // Limpiar chat y poner la primera piedra
        chatBox.innerHTML = ""; 
        agregarMensaje(datos.respuesta_bot, 'bot');
        historialChat.push({role: 'model', content: datos.respuesta_bot});
        outputJson.textContent = JSON.stringify(datos, null, 2);

        // Switch de pantalla
        pantallaConfig.style.display = 'none';
        pantallaChat.style.display = 'block';
        inputChat.focus();

    } catch (e) {
        alert("No se pudo iniciar la simulación. Revisa la consola.");
        console.error(e);
    } finally {
        btnComenzar.textContent = "Comenzar Simulación";
        btnComenzar.disabled = false;
    }
});

// --- EVENTOS DE TECLADO ---
inputChat.addEventListener('keydown', (e) => {
    if (!tiempoInicio) tiempoInicio = Date.now();
    pulsacionesTotales++;
    if (e.key === 'Backspace' || e.key === 'Delete') contadorBorrados++;
    actualizarBioBar();
});

inputChat.addEventListener('paste', () => {
    hizoCopyPaste = true;
    if (!tiempoInicio) tiempoInicio = Date.now();
    actualizarBioBar();
});

// --- ENVÍO DE MENSAJES ---
btnEnviar.addEventListener('click', async () => {
    const msg = inputChat.value.trim();
    if (!msg) return;

    agregarMensaje(msg, 'usuario');
    inputChat.value = '';
    btnEnviar.disabled = true;

    const divEscribiendo = document.createElement('div');
    divEscribiendo.className = 'mensaje escribiendo';
    divEscribiendo.textContent = 'Procesando psicología...';
    chatBox.appendChild(divEscribiendo);

    const payload = {
        tiempo_escritura_segundos: tiempoInicio ? (Date.now() - tiempoInicio)/1000 : 0,
        teclas_borrado: contadorBorrados,
        pulsaciones_totales: pulsacionesTotales,
        ratio_duda: parseFloat((pulsacionesTotales / Math.max(1, msg.length)).toFixed(2)),
        copy_paste_detectado: hizoCopyPaste,
        longitud_caracteres: msg.length,
        edad_usuario: 16
    };

    try {
        const res = await fetch('http://127.0.0.1:8000/simular-friccion', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                escenario: inputEscenario.value,
                texto_usuario: msg,
                metadatos: payload,
                historial: historialChat
            })
        });

        divEscribiendo.remove();
        const datos = await res.json();
        agregarMensaje(datos.respuesta_bot, 'bot');
        
        historialChat.push({role: 'user', content: msg});
        historialChat.push({role: 'model', content: datos.respuesta_bot});
        outputJson.textContent = JSON.stringify(datos, null, 2);
    } catch (e) {
        divEscribiendo.remove();
        agregarMensaje("Error de conexión", 'bot');
    } finally {
        resetSensores();
        btnEnviar.disabled = false;
    }
});
</script>
</body>
</html>
