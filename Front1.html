<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSUKOYOM-IA</title>
    <style>
        /* Quiero que la página tenga un diseño limpio, como color principal el rojo:*/
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>

    <h2>TSUKOYOM-IA</h2>
    <p>Escribe tu mensaje. El sistema está capturando tus metadatos de escritura en tiempo real.</p>

    <textarea id="chat-input" placeholder="Escribe tu respuesta aquí..."></textarea>
    <br>
    <button id="btn-enviar">Enviar Mensaje</button>

    <h3>Datos capturados para la Fase B (JSON):</h3>
    <pre id="output-json">Aún no hay datos...</pre>
    <script>
        // === 1. VARIABLES DE ESTADO (LOS SENSORES) ===
const inputChat = document.getElementById('chat-input');
const btnEnviar = document.getElementById('btn-enviar');
const outputJson = document.getElementById('output-json');

let tiempoInicio = null;
let contadorBorrados = 0;
let pulsacionesTotales = 0; // NUEVA MÉTRICA: Mide el esfuerzo total
let hizoCopyPaste = false;

// === 2. ESCUCHADORES DE EVENTOS (LISTENERS) ===

// A. Iniciar el cronómetro con el primer cambio
inputChat.addEventListener('input', () => {
    if (!tiempoInicio) {
        tiempoInicio = new Date().getTime();
    }
});

// B. Monitorear cada pulsación de teclado
inputChat.addEventListener('keydown', (evento) => {
    pulsacionesTotales++; // Sumamos cualquier tecla presionada
    
    if (evento.key === 'Backspace' || evento.key === 'Delete') {
        contadorBorrados++;
    }
});

// C. Detectar la trampa del Copy-Paste
inputChat.addEventListener('paste', () => {
    hizoCopyPaste = true;
    if (!tiempoInicio) {
        tiempoInicio = new Date().getTime();
    }
});

// D. NUEVA REGLA: Evitar que cierre la pestaña por accidente si hay texto
window.addEventListener('beforeunload', (evento) => {
    if (inputChat.value.trim().length > 0) {
        // Los navegadores modernos muestran un mensaje estándar por seguridad
        evento.preventDefault();
        evento.returnValue = ''; 
    }
});

// === 3. EMPAQUETADO Y ENVÍO ===
btnEnviar.addEventListener('click', () => {
    const textoFinal = inputChat.value.trim();
    
    if (textoFinal === "") {
        alert("Por favor, escribe un mensaje.");
        return;
    }

    const tiempoFin = new Date().getTime();
    const tiempoTotalSegundos = (tiempoFin - tiempoInicio) / 1000;
    
    // Nueva métrica derivada: Eficiencia de tecleo
    // Si es cerca a 1.0, escribió perfecto. Si es muy alto, dudó mucho.
    const ratioDuda = textoFinal.length > 0 ? (pulsacionesTotales / textoFinal.length).toFixed(2) : 0;

    const payload = {
        texto_usuario: textoFinal,
        metadatos: {
            tiempo_escritura_segundos: parseFloat(tiempoTotalSegundos.toFixed(2)),
            teclas_borrado: contadorBorrados,
            pulsaciones_totales: pulsacionesTotales,
            ratio_duda: parseFloat(ratioDuda), // Dato pre-masticado para PyTorch
            copy_paste_detectado: hizoCopyPaste,
            longitud_caracteres: textoFinal.length
        }
    };

    outputJson.textContent = JSON.stringify(payload, null, 4);

    // Reiniciar todo para el siguiente mensaje
    inputChat.value = "";
    tiempoInicio = null;
    contadorBorrados = 0;
    pulsacionesTotales = 0;
    hizoCopyPaste = false;
        });
    
    </script>
</body>
</html>
